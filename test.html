<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Nova Search · Smarter Web</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <style>
    :root {
      color-scheme: dark light;
      --bg: #05060a;
      --bg-elevated: #111827;
      --accent: #3b82f6;
      --accent-soft: rgba(59, 130, 246, 0.1);
      --accent-strong: rgba(59, 130, 246, 0.2);
      --text: #f9fafb;
      --muted: #9ca3af;
      --border: #1f2937;
      --danger: #f97373;
      --radius-lg: 18px;
      --radius-md: 12px;
      --radius-sm: 999px;
      --shadow-soft: 0 18px 45px rgba(15, 23, 42, 0.6);
      --shadow-subtle: 0 10px 30px rgba(15, 23, 42, 0.35);
      --blur: 18px;
      --transition-fast: 150ms ease-out;
      --transition-med: 220ms ease;
      --font-sans: system-ui, -apple-system, BlinkMacSystemFont, "SF Pro Text",
        "Segoe UI", sans-serif;
    }

    * {
      box-sizing: border-box;
      -webkit-font-smoothing: antialiased;
    }

    body {
      margin: 0;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: stretch;
      background: radial-gradient(circle at top, #020617 0, #020617 35%, #000 100%);
      color: var(--text);
      font-family: var(--font-sans);
    }

    .app-shell {
      flex: 1;
      display: flex;
      flex-direction: column;
      max-width: 960px;
      margin: 18px auto;
      padding: 14px 16px 18px;
      gap: 12px;
    }

    .top-bar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 10px 16px;
      border-radius: 999px;
      background: linear-gradient(135deg, rgba(15, 23, 42, 0.85), rgba(15, 23, 42, 0.65));
      border: 1px solid rgba(148, 163, 184, 0.25);
      box-shadow: var(--shadow-subtle);
      backdrop-filter: blur(16px);
      gap: 12px;
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 8px;
      font-weight: 600;
      letter-spacing: 0.02em;
    }

    .brand-orb {
      width: 16px;
      height: 16px;
      border-radius: 999px;
      background: conic-gradient(from 210deg, #3b82f6, #a855f7, #22c55e, #eab308, #3b82f6);
      box-shadow: 0 0 12px rgba(59, 130, 246, 0.6);
    }

    .brand span {
      font-size: 14px;
    }

    .top-actions {
      display: flex;
      align-items: center;
      gap: 10px;
      font-size: 12px;
      color: var(--muted);
    }

    .badge {
      padding: 2px 10px;
      border-radius: 999px;
      border: 1px solid rgba(148, 163, 184, 0.4);
      background: radial-gradient(circle at top left, rgba(59, 130, 246, 0.2), transparent 55%);
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 0.08em;
    }

    .mode-toggle {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 3px 9px;
      border-radius: 999px;
      border: 1px solid rgba(148, 163, 184, 0.45);
      background: rgba(15, 23, 42, 0.8);
      cursor: pointer;
    }

    .mode-toggle span {
      font-size: 11px;
    }

    .mode-dot {
      width: 8px;
      height: 8px;
      border-radius: 999px;
      background: #22c55e;
      box-shadow: 0 0 10px rgba(34, 197, 94, 0.9);
    }

    .main-card {
      flex: 1;
      display: flex;
      flex-direction: column;
      border-radius: 26px;
      background: radial-gradient(circle at top left, rgba(56, 189, 248, 0.18), transparent 52%),
        radial-gradient(circle at top right, rgba(244, 114, 182, 0.16), transparent 55%),
        linear-gradient(145deg, #020617 0%, #020617 45%, #020617 100%);
      border: 1px solid rgba(148, 163, 184, 0.28);
      box-shadow: var(--shadow-soft);
      padding: 18px;
      gap: 14px;
      position: relative;
      overflow: hidden;
    }

    .main-card::before {
      content: "";
      position: absolute;
      inset: 0;
      background:
        radial-gradient(circle at 25% 0, rgba(56, 189, 248, 0.22), transparent 55%),
        radial-gradient(circle at 80% 0, rgba(251, 113, 133, 0.16), transparent 60%),
        radial-gradient(circle at 15% 90%, rgba(34, 197, 94, 0.14), transparent 55%);
      opacity: 0.8;
      pointer-events: none;
      mix-blend-mode: screen;
    }

    .main-inner {
      position: relative;
      z-index: 1;
      display: flex;
      flex-direction: column;
      flex: 1;
      gap: 16px;
    }

    .hero {
      display: flex;
      justify-content: space-between;
      gap: 16px;
      align-items: flex-start;
      padding: 4px 4px 4px;
    }

    .hero-copy {
      max-width: 60%;
    }

    .hero-title {
      font-size: 24px;
      font-weight: 650;
      letter-spacing: 0.02em;
      display: flex;
      align-items: baseline;
      flex-wrap: wrap;
      gap: 4px;
    }

    .hero-title span.primary {
      background: linear-gradient(120deg, #22c55e, #3b82f6, #a855f7, #f97316);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
      text-shadow: 0 0 18px rgba(59, 130, 246, 0.85);
    }

    .hero-subtitle {
      margin-top: 6px;
      font-size: 13px;
      color: var(--muted);
    }

    .hero-pills {
      margin-top: 10px;
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      font-size: 11px;
    }

    .pill {
      padding: 3px 8px;
      border-radius: 999px;
      border: 1px solid rgba(148, 163, 184, 0.4);
      background: rgba(15, 23, 42, 0.85);
      display: inline-flex;
      align-items: center;
      gap: 6px;
      color: var(--muted);
    }

    .pill-dot {
      width: 6px;
      height: 6px;
      border-radius: 999px;
      background: #f97316;
    }

    .ai-orbit {
      position: relative;
      width: 140px;
      height: 80px;
      border-radius: 999px;
      background: radial-gradient(circle at top, rgba(15, 23, 42, 0.85), rgba(15, 23, 42, 0.9));
      border: 1px solid rgba(148, 163, 184, 0.4);
      box-shadow: 0 18px 40px rgba(8, 47, 73, 0.9);
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 4px;
      padding: 6px 10px;
      overflow: hidden;
    }

    .ai-orbit::before {
      content: "";
      position: absolute;
      inset: 0;
      background:
        radial-gradient(circle at 10% 0, rgba(56, 189, 248, 0.35), transparent 55%),
        radial-gradient(circle at 90% 0, rgba(251, 113, 133, 0.32), transparent 60%),
        radial-gradient(circle at 50% 100%, rgba(34, 197, 94, 0.35), transparent 55%);
      mix-blend-mode: screen;
      opacity: 0.9;
      pointer-events: none;
    }

    .ai-orbit-inner {
      position: relative;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .ai-node {
      width: 22px;
      height: 22px;
      border-radius: 999px;
      background: radial-gradient(circle at 30% 0, #f97316, #7c2d12);
      display: flex;
      align-items: center;
      justify-content: center;
