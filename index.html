    <script>
        function handleSearch() {
            // Get input and make it lowercase to prevent typos
            const query = document.getElementById('siteSearch').value.toLowerCase().trim();

            if (query === "windows xp") {
                window.location.href = "https://archive.org/details/WinXPProSP3x86";
            } else if (query !== "") {
                alert("No results found for: " + query);
            }
        }

        // Allow pressing "Enter" key to search
        document.getElementById('siteSearch').addEventListener('keypress', function (e) {
            if (e.key === 'Enter') {
                handleSearch();
            }
        });
    </script>
