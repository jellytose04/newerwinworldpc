<!DOCTYPE html>
<html>
<head>

    <style>
        body { 
            font-family: sans-serif; 
            padding: 20px; 
            margin: 0;
        }

        /* Positions search bar in top right */
        .search-wrapper {
            position: absolute;
            top: 20px;
            right: 20px;
            display: flex;
            gap: 5px;
        }

        input {
            padding: 8px;
            border: 1px solid #ccc;
            border-radius: 4px;
        }

        button {
            padding: 8px 12px;
            background-color: #007bff;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
        }

        button:hover { background-color: #0056b3; }
    </style>
</head>
<body>

    <div class="search-wrapper">
        <input type="text" id="siteSearch" placeholder="Search systems...">
        <button onclick="handleSearch()">Search</button>
    </div>

    <h1>newer winworldpc</h1>
    <p><a href="https://jellytose04.github.io">Library</a></p>

    <script>
        function handleSearch() {
            const query = document.getElementById('siteSearch').value.toLowerCase().trim();

            // Redirect for Windows XP
            if (query === "windows xp") {
                window.location.href = "https://archive.org";
            } else if (query !== "") {
                alert("No results found for: " + query);
            }
        }

        // Search when user presses Enter
        document.getElementById('siteSearch').addEventListener('keypress', function (e) {
            if (e.key === 'Enter') {
                handleSearch();
            }
        });
    </script>

</body>
